{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}BaseApp{% endblock %}</title>
    <link href="{% static 'vendor/tabler/css/tabler.min.css' %}" rel="stylesheet">
    <link href="{% static 'vendor/tabler/icons/tabler-icons.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/app.css' %}" rel="stylesheet">
</head>
<body class="auth-cover-body">
    <div class="auth-cover-page">
        <div class="auth-cover-layout">
            <aside class="auth-cover-aside d-none d-lg-flex"></aside>

            <main class="auth-cover-main">
                <div class="auth-cover-main__inner">
                    <div class="auth-cover-form-shell">
                        <div class="auth-cover-mobile-brand d-lg-none">
                            <span class="auth-cover-brand__badge">BaseApp</span>
                            <span class="auth-cover-brand__text">Painel interno com Django e Tabler</span>
                        </div>

                        <div class="auth-cover-form-header">
                            <p class="auth-cover-form-header__eyebrow">{% block eyebrow %}Acesso externo{% endblock %}</p>
                            <h1 class="auth-cover-form-header__title">{% block heading %}{% endblock %}</h1>
                            {% block intro %}{% endblock %}
                        </div>

                        {% block body %}{% endblock %}

                        <div class="auth-cover-form-footer">
                            {% block footer %}{% endblock %}
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="{% static 'vendor/tabler/js/tabler.min.js' %}"></script>
</body>
</html>
