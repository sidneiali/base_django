<div data-page-title="Grupos">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h3 class="card-title mb-0">Grupos</h3>
            <a href="{% url 'panel_group_create' %}" class="btn btn-primary">Novo grupo</a>
        </div>

        <div class="card-body border-bottom">
            <form method="get" class="row g-2" hx-push-url="true">
                <div class="col-md-4">
                    <input
                        type="text"
                        name="q"
                        value="{{ query }}"
                        class="form-control"
                        placeholder="Pesquisar grupo"
                    >
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-outline-primary">Pesquisar</button>
                </div>
            </form>
        </div>

        <div class="table-responsive">
            <table class="table table-vcenter table-hover card-table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Permissões</th>
                        <th class="text-end">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for group in groups %}
                        <tr>
                            <td>{{ group.name }}</td>
                            <td>{{ group.permissions.count }}</td>
                            <td class="text-end">
                                <a href="{% url 'panel_group_update' group.pk %}" class="btn btn-sm btn-primary">
                                    Editar
                                </a>
                            </td>
                        </tr>
                    {% empty %}
                        <tr>
                            <td colspan="3" class="text-center text-secondary">
                                Nenhum grupo encontrado.
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
