<div data-page-title="{{ page_title }}">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title mb-0">{{ page_title }}</h3>
        </div>

        <div class="card-body">
            <form method="post" class="row g-3" id="group-form">
                {% csrf_token %}

                <div class="col-12">
                    <label class="form-label" for="{{ form.name.id_for_label }}">
                        {{ form.name.label }}
                    </label>
                    {{ form.name }}
                    {% if form.name.errors %}
                        <div class="invalid-feedback d-block">{{ form.name.errors }}</div>
                    {% endif %}
                </div>

                <div class="col-12">
                    <label class="form-label">{{ form.permissions.label }}</label>

                    <div class="d-flex gap-2 align-items-stretch dual-list-wrapper" data-dual-list>

                        <div class="d-flex flex-column flex-grow-1 dual-list-col">
                            <div class="text-secondary small mb-1">Disponíveis</div>
                            <input
                                type="text"
                                class="form-control form-control-sm mb-2"
                                placeholder="Filtrar permissões..."
                                data-dual-list-filter
                            >
                            <select
                                class="form-select flex-grow-1 dual-list-select"
                                multiple
                                data-dual-list-available
                            >
                                {% for pk, label in perm_available %}
                                    <option value="{{ pk }}">{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="d-flex flex-column justify-content-center gap-2 flex-shrink-0 dual-list-actions-col">
                            <button type="button" class="btn btn-outline-primary btn-sm" data-dual-list-add>Adicionar →</button>
                            <button type="button" class="btn btn-outline-secondary btn-sm" data-dual-list-remove>← Remover</button>
                            <button type="button" class="btn btn-outline-primary btn-sm" data-dual-list-add-all>Todos →</button>
                            <button type="button" class="btn btn-outline-secondary btn-sm" data-dual-list-remove-all>← Nenhum</button>
                        </div>

                        <div class="d-flex flex-column flex-grow-1 dual-list-col">
                            <div class="text-secondary small mb-1">Selecionadas</div>
                            <div class="dual-list-spacer"></div>
                            <select
                                id="id_permissions"
                                name="permissions"
                                class="form-select flex-grow-1 dual-list-select"
                                multiple
                                data-dual-list-chosen
                            >
                                {% for pk, label in perm_chosen %}
                                    <option value="{{ pk }}" selected>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>

                    </div>

                    {% if form.permissions.errors %}
                        <div class="invalid-feedback d-block">{{ form.permissions.errors }}</div>
                    {% endif %}
                </div>

                {% if form.non_field_errors %}
                    <div class="col-12">
                        <div class="alert alert-danger mb-0">{{ form.non_field_errors }}</div>
                    </div>
                {% endif %}

                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary" id="btn-salvar-group">Salvar</button>
                    <a href="{% url 'panel_groups_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
