<div data-page-title="Dashboard" data-teste="dashboard-page">
{% for group_name, group_modules in modules.items %}
    <div class="mb-4">
        <h2 class="page-title mb-3">{{ group_name }}</h2>

        <div class="row row-deck row-cards">
            {% for module in group_modules %}
                <div class="col-sm-6 col-lg-4">
                    <div class="card {% if not module.has_access %}module-locked{% endif %}">
                        <div class="card-body">
                            <div class="d-flex align-items-center mb-3">
                                <span class="avatar avatar-md me-3">
                                    <i class="{{ module.icon }}"></i>
                                </span>
                                <div>
                                    <h3 class="card-title mb-0">{{ module.name }}</h3>
                                    <div class="text-secondary">{{ module.description }}</div>
                                </div>
                            </div>

                            {% if module.has_access %}
                                <a href="{{ module.url }}" class="btn btn-primary w-100">Acessar</a>
                            {% else %}
                                <button class="btn btn-secondary w-100" disabled>Sem acesso</button>
                            {% endif %}
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
{% empty %}
    <div class="alert alert-warning mb-0">
        Nenhum módulo cadastrado.
    </div>
{% endfor %}
</div>
